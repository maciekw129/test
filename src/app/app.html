<div style="padding: 2rem;">
  <h2>Multi-Select z przeciąganiem i filtrowaniem</h2>
  
  <mat-form-field style="width: 100%; max-width: 600px;">
    <mat-label>Wybierz owoce</mat-label>
    <app-multi-select-chips
      [(ngModel)]="selectedFruits"
      [options]="myOptions"
      [placeholder]="'Dodaj owoc...'"
      name="fruitsControl">
    </app-multi-select-chips>
  </mat-form-field>
  
  <div style="margin-top: 1rem;">
    <strong>Wybrane ID:</strong> {{ selectedFruits | json }}
  </div>
</div>
